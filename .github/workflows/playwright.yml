name: Playwright Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'playwright/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    paths:
      - 'playwright/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev/test/prod)"
        required: false
        default: "test"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: playwright

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: playwright/yarn.lock

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🧪 Run Playwright tests
        env:
          ENV: ${{ github.event.inputs.environment || 'test' }}
        run: yarn pw:test
        continue-on-error: true
        id: tests

      - name: 📊 Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright/playwright-report

      - name: 🚀 Deploy Playwright Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright/playwright-report
          publish_branch: gh-pages
          destination_dir: playwright
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(playwright): publish report [skip ci]'

      - name: ❌ Fail the workflow if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
