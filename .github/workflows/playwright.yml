name: Playwright Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'playwright/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    paths:
      - 'playwright/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev/test/prod)"
        required: false
        default: "test"
      tests:
        description: "Comma-separated demo keys (login_valid,login_negative,cart,checkout_negative,bug). Empty = full default suite."
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: playwright

    env:
      CI_COMMIT_MSG: ${{ github.event.head_commit.message }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: playwright/yarn.lock

      - name: ☕ Set up Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🧭 Resolve spec filter from selected demo tests
        id: specs
        working-directory: playwright
        run: |
          KEYS="${{ github.event.inputs.tests }}"
          if [ -z "$KEYS" ]; then
            echo "spec=" >> "$GITHUB_OUTPUT"
            echo "No demo filter — running full default suite."
            exit 0
          fi
          declare -A MAP
          MAP[login_valid]="tests/demo/login-valid.spec.ts"
          MAP[login_negative]="tests/demo/login-negative.spec.ts"
          MAP[cart]="tests/demo/cart.spec.ts"
          MAP[checkout_negative]="tests/demo/checkout-negative.spec.ts"
          MAP[bug]="tests/demo/bug.spec.ts"
          IFS=',' read -ra TOKENS <<< "$KEYS"
          SPECS=""
          for key in "${TOKENS[@]}"; do
            key=$(echo "$key" | xargs)
            path="${MAP[$key]:-}"
            if [ -n "$path" ]; then SPECS+="${SPECS:+ }$path"; fi
          done
          echo "spec=$SPECS" >> "$GITHUB_OUTPUT"
          echo "Resolved spec filter: $SPECS"

      - name: 🧪 Run Playwright tests
        env:
          ENV: ${{ github.event.inputs.environment || 'test' }}
        run: |
          if [ -n "${{ steps.specs.outputs.spec }}" ]; then
            npx playwright test ${{ steps.specs.outputs.spec }}
          else
            yarn pw:test
          fi
        continue-on-error: true
        id: tests

      - name: 📝 Write Allure environment.xml (UTF-8)
        if: always()
        working-directory: playwright
        run: |
          mkdir -p allure-results
          PW_VERSION=$(node -p "require('@playwright/test/package.json').version" 2>/dev/null || echo "1.x")
          COMMIT_MSG=$(git log -1 --pretty=%s | head -c 120 | python3 -c "import html,sys; print(html.escape(sys.stdin.read()))")
          COMMIT_AUTHOR=$(echo "${{ github.event.head_commit.author.name || github.actor }}" | python3 -c "import html,sys; print(html.escape(sys.stdin.read()))")

          cat > allure-results/environment.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <environment>
            <parameter><key>Test.Framework</key><value>Playwright</value></parameter>
            <parameter><key>Test.Framework.Version</key><value>$PW_VERSION</value></parameter>
            <parameter><key>Test.Reporter</key><value>allure-playwright + built-in HTML</value></parameter>
            <parameter><key>Test.Target.URL</key><value>https://www.saucedemo.com</value></parameter>
            <parameter><key>Test.Target.Name</key><value>SauceDemo (Sauce Labs demo storefront)</value></parameter>
            <parameter><key>Test.Environment</key><value>${{ github.event.inputs.environment || 'test' }}</value></parameter>
            <parameter><key>Test.Browsers</key><value>Chromium + Firefox + WebKit</value></parameter>
            <parameter><key>Test.Parallel.Mode</key><value>projects (multi-browser)</value></parameter>
            <parameter><key>Test.Executor</key><value>GitHub Actions</value></parameter>
            <parameter><key>Test.Executor.Runner</key><value>${{ runner.os }} (${{ runner.arch }})</value></parameter>
            <parameter><key>Node.Version</key><value>$(node --version)</value></parameter>
            <parameter><key>Yarn.Version</key><value>$(yarn --version)</value></parameter>
            <parameter><key>CI.Branch</key><value>${{ github.ref_name }}</value></parameter>
            <parameter><key>CI.Commit</key><value>${{ github.sha }}</value></parameter>
            <parameter><key>CI.Commit.Short</key><value>$(echo ${{ github.sha }} | cut -c1-7)</value></parameter>
            <parameter><key>CI.Commit.Message</key><value>$COMMIT_MSG</value></parameter>
            <parameter><key>CI.Commit.Author</key><value>$COMMIT_AUTHOR</value></parameter>
            <parameter><key>CI.Trigger</key><value>${{ github.event_name }}</value></parameter>
            <parameter><key>CI.Workflow</key><value>${{ github.workflow }}</value></parameter>
            <parameter><key>CI.Run.Number</key><value>#${{ github.run_number }}</value></parameter>
            <parameter><key>CI.Run.Started</key><value>$(date -u +"%Y-%m-%dT%H:%M:%SZ")</value></parameter>
            <parameter><key>Report.Owner</key><value>Martin Miláček &lt;martin.milacek@professional-test-automation.com&gt;</value></parameter>
            <parameter><key>Report.Company</key><value>Professional Test Automation s.r.o.</value></parameter>
            <parameter><key>Report.Repository</key><value>${{ github.server_url }}/${{ github.repository }}</value></parameter>
          </environment>
          EOF

      - name: 📝 Write Allure executor.json
        if: always()
        working-directory: playwright
        run: |
          mkdir -p allure-results
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Playwright Tests #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Playwright — Allure Report",
            "reportUrl": "https://milacekmartin.github.io/professional-test-automation/playwright-allure/"
          }
          EOF

      - name: 📝 Write Allure categories.json
        if: always()
        working-directory: playwright
        run: |
          mkdir -p allure-results
          cat > allure-results/categories.json <<'EOF'
          [
            { "name": "🔴 Product defects (real bugs found)", "matchedStatuses": ["failed"], "messageRegex": ".*Error: expect.*|.*Received.*Expected.*" },
            { "name": "🟡 Test infrastructure issues",        "matchedStatuses": ["broken"], "messageRegex": ".*ENOTFOUND.*|.*ECONNREFUSED.*|.*browser.* closed.*" },
            { "name": "🔵 Environment issues",                "matchedStatuses": ["broken"], "messageRegex": ".*503.*|.*502.*|.*504.*" },
            { "name": "🟣 Flaky / timing issues",             "matchedStatuses": ["failed","broken"], "messageRegex": ".*Timeout.*|.*TimeoutError.*|.*retried.*" },
            { "name": "⚪ Skipped",                           "matchedStatuses": ["skipped"] }
          ]
          EOF

      - name: 📊 Restore Allure history (trend charts)
        if: always()
        working-directory: playwright
        run: |
          mkdir -p allure-results/history
          for f in history.json categories-trend.json duration-trend.json history-trend.json retry-trend.json; do
            curl -sSL -o "allure-results/history/$f" \
              "https://milacekmartin.github.io/professional-test-automation/playwright-allure/history/$f" 2>/dev/null || true
            [ -s "allure-results/history/$f" ] || rm -f "allure-results/history/$f"
          done

      - name: 📊 Generate Allure report
        if: always()
        working-directory: playwright
        run: |
          npx -y allure-commandline generate allure-results --clean -o allure-report || true
          [ -d allure-report/history ] && cp -r allure-report/history allure-results/history || true

      - name: 📦 Upload Playwright HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright/playwright-report

      - name: 📦 Upload Playwright Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-allure-report
          path: playwright/allure-report

      - name: 🚀 Deploy Playwright HTML report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright/playwright-report
          publish_branch: gh-pages
          destination_dir: playwright
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(playwright): publish HTML report #${{ github.run_number }} [skip ci]'

      - name: 🚀 Deploy Playwright Allure report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright/allure-report
          publish_branch: gh-pages
          destination_dir: playwright-allure
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(playwright): publish Allure report #${{ github.run_number }} [skip ci]'

      - name: ❌ Fail the workflow if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
