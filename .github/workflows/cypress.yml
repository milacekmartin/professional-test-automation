name: Cypress Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'cypress/**'
      - 'cypress.config.ts'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/cypress.yml'
  pull_request:
    paths:
      - 'cypress/**'
  workflow_dispatch:
    inputs:
      config:
        description: "Config name in cypress/configs (without .json)"
        required: false
        default: "test"
      tests:
        description: "Comma-separated demo keys (login_valid,login_negative,cart,checkout_negative,bug). Empty = full default suite."
        required: false
        default: ""

concurrency:
  group: cypress-pages-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: ☕ Set up Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile
        continue-on-error: true

      - name: 📦 Install fs-extra (cypress config dependency)
        run: yarn add -D fs-extra

      - name: 🧭 Resolve spec filter from selected demo tests
        id: specs
        run: |
          KEYS="${{ github.event.inputs.tests }}"
          if [ -z "$KEYS" ]; then
            echo "spec=" >> "$GITHUB_OUTPUT"
            echo "No demo filter — running full default suite."
            exit 0
          fi
          declare -A MAP
          MAP[login_valid]="cypress/e2e/demo/login-valid.cy.ts"
          MAP[login_negative]="cypress/e2e/demo/login-negative.cy.ts"
          MAP[cart]="cypress/e2e/demo/cart.cy.ts"
          MAP[checkout_negative]="cypress/e2e/demo/checkout-negative.cy.ts"
          MAP[bug]="cypress/e2e/demo/bug.cy.ts"
          IFS=',' read -ra TOKENS <<< "$KEYS"
          SPECS=""
          for key in "${TOKENS[@]}"; do
            key=$(echo "$key" | xargs)
            path="${MAP[$key]:-}"
            if [ -n "$path" ]; then SPECS+="${SPECS:+,}$path"; fi
          done
          echo "spec=$SPECS" >> "$GITHUB_OUTPUT"
          echo "Resolved spec filter: $SPECS"

      - name: 🧪 Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: yarn cy:${{ github.event.inputs.config || 'test' }}:run${{ steps.specs.outputs.spec != '' && format(' --spec ''{0}''', steps.specs.outputs.spec) || '' }}
          browser: chrome
        continue-on-error: true
        id: tests

      # ------------------------------------------------------------------
      # ENRICH ALLURE WITH METADATA
      #   - environment.properties  → shown in "Environment" widget
      #   - executor.json           → shown in "Executor" widget
      #   - categories.json         → custom defect categories
      #   - history/                → preserved between runs for trend charts
      # ------------------------------------------------------------------
      - name: 📝 Write Allure environment.xml (UTF-8 for diacritics)
        if: always()
        run: |
          mkdir -p allure-results
          CHROME_VERSION=$(google-chrome --version 2>/dev/null | head -1 || echo "Chrome (headless)")
          CYPRESS_VER=$(node -p "require('./package.json').devDependencies.cypress || '15.x'" 2>/dev/null)
          COMMIT_MSG=$(git log -1 --pretty=%s | head -c 120 | python3 -c "import html,sys; print(html.escape(sys.stdin.read()))")
          COMMIT_AUTHOR=$(echo "${{ github.event.head_commit.author.name || github.actor }}" | python3 -c "import html,sys; print(html.escape(sys.stdin.read()))")

          cat > allure-results/environment.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <environment>
            <parameter><key>Test.Framework</key><value>Cypress</value></parameter>
            <parameter><key>Test.Framework.Version</key><value>$CYPRESS_VER</value></parameter>
            <parameter><key>Test.Reporter</key><value>allure-cypress</value></parameter>
            <parameter><key>Test.Target.URL</key><value>https://www.saucedemo.com</value></parameter>
            <parameter><key>Test.Target.Name</key><value>SauceDemo (Sauce Labs demo storefront)</value></parameter>
            <parameter><key>Test.Environment</key><value>${{ github.event.inputs.config || 'test' }}</value></parameter>
            <parameter><key>Test.Browser</key><value>$CHROME_VERSION</value></parameter>
            <parameter><key>Test.Browser.Mode</key><value>headless</value></parameter>
            <parameter><key>Test.Executor</key><value>GitHub Actions</value></parameter>
            <parameter><key>Test.Executor.Runner</key><value>${{ runner.os }} (${{ runner.arch }})</value></parameter>
            <parameter><key>Node.Version</key><value>$(node --version)</value></parameter>
            <parameter><key>Yarn.Version</key><value>$(yarn --version)</value></parameter>
            <parameter><key>CI.Branch</key><value>${{ github.ref_name }}</value></parameter>
            <parameter><key>CI.Commit</key><value>${{ github.sha }}</value></parameter>
            <parameter><key>CI.Commit.Short</key><value>$(echo ${{ github.sha }} | cut -c1-7)</value></parameter>
            <parameter><key>CI.Commit.Message</key><value>$COMMIT_MSG</value></parameter>
            <parameter><key>CI.Commit.Author</key><value>$COMMIT_AUTHOR</value></parameter>
            <parameter><key>CI.Trigger</key><value>${{ github.event_name }}</value></parameter>
            <parameter><key>CI.Workflow</key><value>${{ github.workflow }}</value></parameter>
            <parameter><key>CI.Run.Number</key><value>#${{ github.run_number }}</value></parameter>
            <parameter><key>CI.Run.Started</key><value>$(date -u +"%Y-%m-%dT%H:%M:%SZ")</value></parameter>
            <parameter><key>Report.Owner</key><value>Martin Miláček &lt;martin.milacek@professional-test-automation.com&gt;</value></parameter>
            <parameter><key>Report.Company</key><value>Professional Test Automation s.r.o.</value></parameter>
            <parameter><key>Report.Repository</key><value>${{ github.server_url }}/${{ github.repository }}</value></parameter>
          </environment>
          EOF
          echo "--- environment.xml ---"
          cat allure-results/environment.xml

      - name: 📝 Write Allure executor.json
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Cypress Tests #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Cypress — Allure Report",
            "reportUrl": "https://milacekmartin.github.io/professional-test-automation/cypress/"
          }
          EOF

      - name: 📝 Write Allure categories.json
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/categories.json <<'EOF'
          [
            {
              "name": "🔴 Product defects (real bugs found)",
              "matchedStatuses": ["failed"],
              "messageRegex": ".*AssertionError.*|.*expect.*|.*Expected.*"
            },
            {
              "name": "🟡 Test infrastructure issues",
              "matchedStatuses": ["broken"],
              "messageRegex": ".*ENOTFOUND.*|.*ECONNREFUSED.*|.*timeout.*|.*Failed to fetch.*"
            },
            {
              "name": "🔵 Environment issues (staging down, etc.)",
              "matchedStatuses": ["broken"],
              "messageRegex": ".*503.*|.*502.*|.*504.*|.*Service Unavailable.*"
            },
            {
              "name": "🟣 Flaky / timing issues",
              "matchedStatuses": ["failed", "broken"],
              "messageRegex": ".*retried.*|.*Timed out retrying.*|.*element detached.*"
            },
            {
              "name": "⚪ Skipped / pending",
              "matchedStatuses": ["skipped"]
            }
          ]
          EOF

      - name: 📊 Restore Allure history (for trend charts)
        if: always()
        run: |
          mkdir -p allure-results/history
          curl -sSL -o /tmp/prev-report.zip \
            "https://milacekmartin.github.io/professional-test-automation/cypress/history/history.json" 2>/dev/null || true
          # Try downloading individual history files (they're small JSON)
          for f in history.json categories-trend.json duration-trend.json history-trend.json retry-trend.json; do
            curl -sSL -o "allure-results/history/$f" \
              "https://milacekmartin.github.io/professional-test-automation/cypress/history/$f" 2>/dev/null || true
            [ -s "allure-results/history/$f" ] || rm -f "allure-results/history/$f"
          done
          echo "Restored history files:" && ls -la allure-results/history/ || true

      - name: 📊 Generate Allure report
        if: always()
        run: |
          npx allure-commandline generate allure-results --clean -o allure/report || true
          # Preserve history inside report for next run
          [ -d allure/report/history ] && cp -r allure/report/history allure-results/history || true
          ls -la allure/report/ 2>&1 | head -20

      - name: 📦 Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-allure-report
          path: allure/report/

      - name: 🚀 Deploy per-run report (/cypress/runs/<N>/)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure/report
          publish_branch: gh-pages
          destination_dir: cypress/runs/${{ github.run_number }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(cypress): publish Allure report #${{ github.run_number }} [skip ci]'

      - name: 🚀 Deploy "latest" mirror (/cypress/)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure/report
          publish_branch: gh-pages
          destination_dir: cypress
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(cypress): update latest mirror from run #${{ github.run_number }} [skip ci]'

      - name: ❌ Fail the workflow if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
